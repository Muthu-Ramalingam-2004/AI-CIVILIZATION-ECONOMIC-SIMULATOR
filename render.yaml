services:
  - type: web
    name: ai-civ-economic-simulator-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDirectory: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-civ-economic-simulator-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://ai-civilization-economic-simulator.vercel.app
      - key: RESET_TOKEN_SECRET
        generateValue: true
      - key: RESET_TOKEN_EXPIRE_MINUTES
        value: 15
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

databases:
  - name: ai-civ-economic-simulator-db
    plan: free
